name: Publish npm package

on:
  workflow_call:
    inputs:
      tag_name:
        description: Git tag to publish
        required: true
        type: string
      version:
        description: Package version to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to publish. Defaults to the selected ref.
        required: false
        type: string
      version:
        description: Expected package version. Defaults to package.json.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish form-father
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expectedVersion = process.env.EXPECTED_VERSION || pkg.version;

          if (pkg.name !== 'form-father') {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }

          if (pkg.version !== expectedVersion) {
            throw new Error(`package.json version ${pkg.version} does not match expected ${expectedVersion}`);
          }

          console.log(`Ready to publish ${pkg.name}@${pkg.version}`);
          NODE
        env:
          EXPECTED_VERSION: ${{ inputs.version }}

      - name: Run release gate
        run: npm run release:check

      - name: Publish to npm with provenance
        run: npm publish --provenance
